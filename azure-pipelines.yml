# Azure Pipelines CI/CD configuration for WinForms .NET 9 projects with MSIX Installer

trigger:
  branches:
    include:
    - main
    - develop
  paths:
    include:
    - WinFormTest1/**
    - WinFormTest2/**
    - Installer-Test/**
    - azure-pipelines.yml
    exclude:
    - README.md
    - docs/*

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  buildPlatform: 'x64'
  solution: 'Installer-Test.sln'

stages:
- stage: Build
  displayName: 'Build and Package'
  jobs:
  - job: Build
    displayName: 'Build WinForms Applications and Installer'
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 9 SDK'
      inputs:
        packageType: 'sdk'
        version: '9.x'
        installationPath: $(Agent.ToolsDirectory)/dotnet

    - task: NuGetToolInstaller@1
      displayName: 'Install NuGet'

    - task: NuGetCommand@2
      displayName: 'Restore NuGet packages for solution'
      inputs:
        command: 'restore'
        restoreSolution: '$(solution)'

    - task: VSBuild@1
      displayName: 'Build Solution with Installer'
      inputs:
        solution: '$(solution)'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'
        msbuildArgs: '/p:AppxBundlePlatforms="$(buildPlatform)" /p:AppxPackageDir="$(Build.ArtifactStagingDirectory)/AppxPackages/" /p:AppxBundle=Always /p:UapAppxPackageBuildMode=StoreUpload'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Installer Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/AppxPackages'
        ArtifactName: 'MSIX-Installer'
        publishLocation: 'Container'

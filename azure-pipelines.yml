# Azure Pipelines CI/CD for WinForms .NET 9 + MSIX Installer

trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: windows-latest

variables:
  buildConfiguration: Release
  buildPlatform: x64
  solution: Installer-Test.sln

stages:
- stage: Build
  displayName: Build and Package
  jobs:
  - job: Build

    steps:

    - checkout: self
      submodules: true

    - task: UseDotNet@2
      displayName: Install .NET 9 SDK
      inputs:
        packageType: sdk
        version: 9.x

    # Clean old artifacts
    - script: |
        rmdir /s /q WinFormTest1\WinFormsApp1\bin || echo skip
        rmdir /s /q WinFormTest1\WinFormsApp1\obj || echo skip
        rmdir /s /q WinFormTest2\WinFormsApp2\bin || echo skip
        rmdir /s /q WinFormTest2\WinFormsApp2\obj || echo skip
      displayName: Clean old builds

    # Restore WITH runtime identifier
    - task: DotNetCoreCLI@2
      displayName: Restore solution
      inputs:
        command: restore
        projects: $(solution)
        arguments: >
          /p:RuntimeIdentifier=win-x64
          /p:Platform=x64

    # Build using Visual Studio (needed for .wapproj)
    - task: VSBuild@1
      displayName: Build MSIX installer
      inputs:
        solution: $(solution)
        platform: $(buildPlatform)
        configuration: $(buildConfiguration)
        msbuildArgs: >
          /p:RuntimeIdentifier=win-x64
          /p:Platform=x64
          /p:AppxBundlePlatforms=x64
          /p:AppxPackageDir="$(Build.ArtifactStagingDirectory)\AppxPackages\"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=StoreUpload

    - task: PublishBuildArtifacts@1
      displayName: Publish MSIX
      inputs:
        PathtoPublish: $(Build.ArtifactStagingDirectory)\AppxPackages
        ArtifactName: MSIX-Installer
# Azure Pipelines CI/CD configuration for WinForms .NET 9 projects with MSIX Installer

trigger:
  branches:
    include:
    - main
    - develop
  paths:
    include:
    - WinFormTest1/**
    - WinFormTest2/**
    - Installer-Test/**
    - azure-pipelines.yml
    exclude:
    - README.md
    - docs/*

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  buildPlatform: 'x64'
  solution: 'Installer-Test.sln'

stages:
- stage: Build
  displayName: 'Build and Package'
  jobs:
  - job: Build
    displayName: 'Build WinForms Applications and Installer'
    steps:
    - checkout: self
      displayName: 'Checkout main repository'
      submodules: true

    - task: UseDotNet@2
      displayName: 'Install .NET 9 SDK'
      inputs:
        packageType: 'sdk'
        version: '9.x'
        installationPath: $(Agent.ToolsDirectory)/dotnet

    - task: NuGetToolInstaller@1
      displayName: 'Install NuGet'

    - task: DotNetCoreCLI@2
      displayName: 'Restore WinFormsApp1 with runtime'
      inputs:
        command: 'restore'
        projects: 'WinFormTest1/WinFormsApp1/WinFormsApp1.csproj'
        arguments: '--runtime win-x64'

    - task: DotNetCoreCLI@2
      displayName: 'Restore WinFormsApp2 with runtime'
      inputs:
        command: 'restore'
        projects: 'WinFormTest2/WinFormsApp2/WinFormsApp2.csproj'
        arguments: '--runtime win-x64'

    - task: NuGetCommand@2
      displayName: 'Restore NuGet packages for WAP project'
      inputs:
        command: 'restore'
        restoreSolution: '$(solution)'

    - task: VSBuild@1
      displayName: 'Build Solution with Installer'
      inputs:
        solution: '$(solution)'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'
        msbuildArgs: >
          /p:RuntimeIdentifier=win-x64
          /p:AppxBundlePlatforms="$(buildPlatform)"
          /p:AppxPackageDir="$(Build.ArtifactStagingDirectory)/AppxPackages/"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=StoreUpload

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Installer Artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/AppxPackages'
        ArtifactName: 'MSIX-Installer'
        publishLocation: 'Container'

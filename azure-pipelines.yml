# Azure Pipelines CI/CD configuration for WinForms .NET 9 projects with MSIX Installer

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - WinFormTest1/**
      - WinFormTest2/**
      - Installer-Test/**
      - azure-pipelines.yml
    exclude:
      - README.md
      - docs/*

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  buildPlatform: 'x64'
  solution: 'Installer-Test.sln'

stages:
- stage: Build
  displayName: 'Build and Package'
  jobs:
  - job: Build
    displayName: 'Build WinForms Apps and MSIX Installer'

    steps:

    # Checkout repository + submodules
    - checkout: self
      displayName: 'Checkout repository'
      submodules: true

    # Install .NET SDK
    - task: UseDotNet@2
      displayName: 'Install .NET 9 SDK'
      inputs:
        packageType: 'sdk'
        version: '9.x'

    # Clean solution
    - script: dotnet clean $(solution)
      displayName: 'Clean solution'

    # Clear NuGet cache (prevents runtime pack issues)
    - script: dotnet nuget locals all --clear
      displayName: 'Clear NuGet cache'

    # Restore solution with runtime
    - task: DotNetCoreCLI@2
      displayName: 'Restore solution with win-x64 runtime'
      inputs:
        command: 'restore'
        projects: '$(solution)'
        arguments: '--runtime win-x64'

    # Build MSIX installer
    - task: VSBuild@1
      displayName: 'Build solution and create MSIX'
      inputs:
        solution: '$(solution)'
        platform: '$(buildPlatform)'
        configuration: '$(buildConfiguration)'
        msbuildArgs: >
          /p:RuntimeIdentifier=win-x64
          /p:AppxBundlePlatforms="$(buildPlatform)"
          /p:AppxPackageDir="$(Build.ArtifactStagingDirectory)\AppxPackages\"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=StoreUpload

    # Publish artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Publish MSIX Installer'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)\AppxPackages'
        ArtifactName: 'MSIX-Installer'
        publishLocation: 'Container'
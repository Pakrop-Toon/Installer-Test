# Azure Pipelines CI/CD for WinForms .NET 9 + MSIX Installer

trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: windows-latest

variables:
  buildConfiguration: Release
  buildPlatform: x64
  solution: Installer-Test.sln

stages:
- stage: Build
  jobs:
  - job: Build

    steps:

    - checkout: self
      submodules: true

    - task: UseDotNet@2
      displayName: Install .NET 9
      inputs:
        packageType: sdk
        version: 9.x

    # Restore using dotnet (with runtime)
    - task: DotNetCoreCLI@2
      displayName: Restore solution
      inputs:
        command: restore
        projects: $(solution)
        arguments: --runtime win-x64

    # Build using Visual Studio (required for wapproj)
    - task: VSBuild@1
      displayName: Build MSIX installer
      inputs:
        solution: $(solution)
        platform: $(buildPlatform)
        configuration: $(buildConfiguration)
        msbuildArgs: >
          /p:RuntimeIdentifier=win-x64
          /p:AppxBundlePlatforms="$(buildPlatform)"
          /p:AppxPackageDir="$(Build.ArtifactStagingDirectory)\AppxPackages\"
          /p:AppxBundle=Always
          /p:UapAppxPackageBuildMode=StoreUpload

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: $(Build.ArtifactStagingDirectory)\AppxPackages
        ArtifactName: MSIX-Installer